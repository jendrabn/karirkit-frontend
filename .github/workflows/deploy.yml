name: Frontend Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate build on runner
        run: bun run build

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Setup known hosts
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan -H -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure target directory exists
        run: |
          set -euo pipefail
          ssh -o BatchMode=yes -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "mkdir -p /var/www/karirkit-frontend"

      - name: Sync project files to VPS
        run: |
          set -euo pipefail
          rsync -az --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "node_modules" \
            --exclude "dist" \
            --exclude ".env" \
            --exclude ".env.*" \
            -e "ssh -o BatchMode=yes -p ${{ secrets.VPS_PORT }}" \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/karirkit-frontend/"

      - name: Install dependencies and build on VPS
        run: |
          set -euo pipefail
          ssh -o BatchMode=yes -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" << 'EOF'
            set -euo pipefail
            cd /var/www/karirkit-frontend
            BUN_VERSION=1.3.14
            export BUN_INSTALL="${BUN_INSTALL:-$HOME/.bun}"
            export PATH="$BUN_INSTALL/bin:$PATH"
            if ! command -v bun >/dev/null 2>&1 || [ "$(bun --version)" != "$BUN_VERSION" ]; then
              curl -fsSL https://bun.sh/install | bash -s "bun-v$BUN_VERSION"
              export PATH="$BUN_INSTALL/bin:$PATH"
            fi
            bun install --frozen-lockfile
            bun run build
          EOF
